<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Cart - Vrindavan Mart</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; padding: 15px 0; }
    .qty-btn { padding: 5px 10px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; }
    .total-section { margin-top: 20px; font-size: 1.2rem; font-weight: bold; text-align: right; }
    .checkout-btn { background: #28a745; color: white; padding: 12px 24px; border: none; font-size: 1rem; cursor: pointer; float: right; margin-top: 10px; border-radius: 4px;}
  </style>
</head>
<body>

  <h2>Your Shopping Cart</h2>
  <div id="cart-container"></div>
  
  <div class="total-section">
    Total: ₹<span id="cart-total">0.00</span>
  </div>

  <button class="checkout-btn" onclick="submitPayment()">Proceed to Payment</button>

   <script>
    

    function submitPayment() {
      alert("Redirecting to Payment Gateway... Thank you for shopping at Vrindavan Mart!");
      // Here you would normally redirect to your payment gateway URL
    }

    // Load cart on page startup
    displayCart();
  </script>
</body>
</html>
